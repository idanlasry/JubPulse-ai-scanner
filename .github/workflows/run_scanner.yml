name: JobPulse Scanner

on:
  schedule:
    - cron: '0 5 * * 0-5'   # 08:00 Israel time (UTC+3)
    - cron: '0 10 * * 0-5'  # 14:00 Israel time (UTC+3)
    - cron: '0 15 * * 0-5'  # 18:00 Israel time (UTC+3)
  workflow_dispatch:          # Manual trigger

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Decode Telegram session
        run: echo "${{ secrets.TELEGRAM_SESSION_B64 }}" | base64 --decode > jobpulse_session.session

      - name: Run JobPulse pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: uv run python main.py

      - name: Commit updated jobs.csv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.csv
          git diff --cached --quiet || git commit -m "chore: update jobs.csv [skip ci]"
          git push
